<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>{{ isSignupPage ? 'Sign up' : 'Log in' }}</ion-title>
  </ion-toolbar>
  <ion-toolbar>
    <ion-buttons>
      <ion-button routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" expand="block">
        <ion-icon slot="start" name="home-outline"></ion-icon>
        Home
      </ion-button>
   
      <ion-button routerLink="/create-post" routerLinkActive="active" expand="block">
        <ion-icon slot="start" name="add-circle-outline"></ion-icon>
        Create
      </ion-button>
      <ion-button routerLink="/authenticate" routerLinkActive="active" expand="block">
        <ion-icon slot="start" name="person-outline"></ion-icon>
        Account
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">
        {{ isSignupPage ? 'Sign up' : 'Log in' }}
      </ion-title>
    </ion-toolbar>
  </ion-header>
       <h2> {{ isSignupPage ? 'Sign up' : 'Log in' }}</h2>


  <ion-input [(ngModel)]="auth.username" placeholder="username..."></ion-input>

  <ion-input [(ngModel)]="auth.password" type="password" placeholder="password..."></ion-input>

  <p>
    Navigate to 
    <a (click)="SwapAuthPage()">
      {{ isSignupPage ? 'log in' : 'sign up' }}
    </a>
  </p>

  <ion-button expand="block" (click)="submit()">Confirm</ion-button>

</ion-content>
